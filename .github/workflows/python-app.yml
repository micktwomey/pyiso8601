name: Python build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 8
      matrix:
        python-version: [3.6, 3.7, 3.8, 3.9, pypy3]

    steps:
    - uses: actions/checkout@v1
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Update pip
      run: python -m pip install --upgrade pip
    - name: Install poetry
      run: pip install poetry
    - name: Install dependencies
      run: poetry install
    - name: pytest
      run: poetry run pytest -vv --tb=short

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v1
    - uses: actions/setup-python@v2
      with:
        python-version: "3.x"
    - name: Update pip
      run: python -m pip install --upgrade pip
    - name: Install poetry
      run: python -m pip install --upgrade poetry
    - name: Install dependencies
      run: poetry install
    - name: Lint with mypy
      run: poetry run mypy --strict iso8601
